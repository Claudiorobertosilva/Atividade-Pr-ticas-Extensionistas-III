```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão de Consultas</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <h1>🏥 Sistema de Gestão de Consultas</h1>

</header>

<main>

    <section class="cadastro">

        <h2>Cadastro de Pacientes</h2>

        <input type="text" id="nome" placeholder="Nome">

        <input type="text" id="cpf" placeholder="CPF">

        <input type="text" id="telefone" placeholder="Telefone">

        <input type="email" id="email" placeholder="Email">

        <input type="date" id="data_nascimento">

        <button onclick="cadastrarPaciente()">
            Cadastrar
        </button>

    </section>

    <section class="pesquisa">

        <h2>Pesquisar Paciente</h2>

        <input
            type="text"
            id="buscarNome"
            placeholder="Digite o nome">

        <button onclick="buscarPaciente()">
            Pesquisar
        </button>

        <button onclick="listarPacientes()">
            Mostrar Todos
        </button>

    </section>

    <section>

        <h2>Lista de Pacientes</h2>

        <table>

            <thead>

                <tr>

                    <th>ID</th>

                    <th>Nome</th>

                    <th>CPF</th>

                    <th>Telefone</th>

                    <th>Email</th>

                    <th>Nascimento</th>

                    <th>Ações</th>

                </tr>

            </thead>

            <tbody id="listaPacientes">

            </tbody>

        </table>

    </section>

</main>

<script src="script.js"></script>

</body>
</html>
